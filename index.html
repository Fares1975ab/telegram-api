<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>منصة الأستاذ فارس للرياضيات</title>

  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Kufam:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <style>
    :root {
      --primary-500: #3b82f6;
      --primary-600: #2563eb;
      --accent-gold: #FFD700;
      --success: #10b981;
      --success-light: rgba(16, 185, 129, 0.15);
      --warning: #f59e0b;
      --error: #ef4444;

      --bg-dark: #000000;
      --bg-card: rgba(30, 41, 59, 0.7);
      --bg-glass: rgba(255, 255, 255, 0.05);

      --text-primary: #ffffff;
      --text-secondary: #94a3b8;

      --border-subtle: rgba(255, 255, 255, 0.08);
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      font-family: "Kufam", sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(255, 215, 0, 0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ==================== شاشة التحقق ==================== */
    .auth-overlay {
      position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 20px;
    }
    .auth-message { margin-top: 20px; font-size: 1.2rem; color: var(--accent-gold); font-weight: bold; }
    .auth-submessage { margin-top: 10px; color: var(--text-secondary); font-size: 0.9rem; }
    .auth-loader { 
      width: 50px; height: 50px; border: 4px solid var(--border-subtle); 
      border-top-color: var(--primary-500); border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ==================== شريط التنقل العلوي ==================== */
    .nav-bar {
      position: fixed;
      top: 80px; 
      left: 16px;
      right: 16px;
      z-index: 1000;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: var(--bg-glass);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      transform: scale(1.05);
    }

    .nav-btn.hidden { display: none; }

    .nav-btn.active {
      background: var(--primary-600);
      color: white;
    }

    .breadcrumb {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ==================== رصيد الطالب ==================== */
    .credit-badge {
      background: rgba(255, 215, 0, 0.15);
      color: var(--accent-gold);
      padding: 6px 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      border: 1px solid var(--border-subtle);
      font-family: 'Kufam', sans-serif;
      font-size: 0.9rem;
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    /* ==================== البحث ==================== */
    .search-container {
      position: fixed;
      top: 155px;
      left: 16px;
      right: 16px;
      z-index: 997;
      max-width: none;
      margin: 0;
      transition: top 0.3s;
    }

    .search-box {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
    }

    .search-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: var(--bg-glass);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      max-height: 400px;
      overflow-y: auto;
      display: none;
    }

    .search-results.active { display: block; }
    .search-result-item { padding: 16px; border-bottom: 1px solid var(--border-subtle); cursor: pointer; display: flex; align-items: center; gap: 12px; }
    .search-result-item:hover { background: rgba(255,255,255,0.05); }
    .search-result-icon { width: 40px; height: 40px; background: var(--bg-glass); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .search-result-content { flex: 1; }
    .search-result-title { font-weight: 700; color: var(--text-primary); }

    /* ==================== المحتوى الرئيسي ==================== */
    .main-wrapper {
      padding: 240px 24px 40px; 
      width: 100%;
      max-width: none;
      margin: 0;
      position: relative;
      z-index: 1;
    }

    .hero-section { text-align: center; margin-bottom: 40px; }
    .hero-title {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .hero-subtitle { color: var(--text-secondary); font-size: 1.1rem; }

    /* ==================== شبكة الأزرار ==================== */
    .buttons-grid { display: grid; gap: 16px; }

    .btn-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      color: var(--text-primary);
      font-size: 1.1rem;
      font-weight: 700;
      font-family: "Amiri", serif;
      cursor: pointer;
      text-align: right;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 16px;
      overflow: hidden;
      user-select: none;
    }

    .btn-card:hover { border-color: var(--primary-500); transform: translateX(-4px); }
    .btn-card.completed { background: var(--success-light); border-color: var(--success); }
    .btn-card.completed .btn-icon-wrapper { background: var(--success); color: white; }
    .btn-card.completed .btn-title { color: var(--success); }

    .btn-icon-wrapper {
      width: 52px;
      height: 52px;
      background: var(--bg-glass);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-icon-wrapper svg { width: 26px; height: 26px; color: var(--accent-gold); }
    .btn-content { flex: 1; }
    .btn-title { display: block; font-size: 1.15rem; margin-bottom: 4px; font-family: "Kufam", sans-serif;}
    .btn-subtitle { display: block; font-size: 0.85rem; color: var(--text-secondary); font-family: "Kufam", sans-serif;}

    .content-viewer { display: none; position: fixed; inset: 0; width: 100vw; height: 100vh; background: var(--bg-dark); z-index: 2000; flex-direction: column; }
    .content-viewer.active { display: flex; }
    
    .content-header { 
      background: var(--bg-card); 
      border-bottom: 1px solid var(--border-subtle); 
      padding: 90px 20px 16px; 
      display: flex; 
      align-items: center; 
      gap: 16px; 
    }
    .content-title { flex: 1; font-weight: 800; color: var(--accent-gold); }
    .content-frame { flex: 1; display: block; border: none; width: 100vw; height: 100vh; background: white; }

    /* ==================== نافذة الملف الشخصي (Modal) ==================== */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000;
      justify-content: center; align-items: center; backdrop-filter: blur(5px);
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg-card); border: 1px solid var(--accent-gold); border-radius: var(--radius-lg);
      padding: 24px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 10px 40px rgba(255, 215, 0, 0.1);
    }
    .modal-content h3 { color: var(--accent-gold); margin-bottom: 8px; font-family: 'Kufam', sans-serif; text-align: center;}
    .modal-input {
      background: var(--bg-dark); border: 1px solid var(--border-subtle); color: var(--text-primary);
      padding: 12px; border-radius: 8px; font-family: 'Amiri', serif; font-size: 1.1rem; width: 100%; outline: none;
    }
    .modal-input:focus { border-color: var(--accent-gold); }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
    .modal-btn {
      padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Kufam', sans-serif; flex: 1;
    }
    .btn-save { background: var(--accent-gold); color: #000; }
    .btn-cancel { background: var(--bg-glass); color: var(--text-primary); }

    /* ==================== Toast ==================== */
    .toast-container { position: fixed; top: 180px; left: 50%; transform: translateX(-50%); z-index: 4000; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      animation: slideDown 0.3s ease;
      font-weight: 600;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    /* ==================== تعديلات خاصة للهواتف ==================== */
    @media (max-width: 767px) {
      .nav-bar { top: 70px; }
      .search-container { top: 145px; }
      .main-wrapper { padding-top: 220px; padding-bottom: 40px; }
      .content-header { padding: 80px 16px 12px; } 
    }

    @media (min-width: 768px) {
      .buttons-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1024px) {
      .main-wrapper { padding: 240px 40px 50px; }
      .buttons-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
      .hero-title { font-size: 3.4rem; }
      .hero-subtitle { font-size: 1.25rem; }
      .btn-card { min-height: 120px; padding: 28px; }
      .btn-title { font-size: 1.35rem; }
      .btn-subtitle { font-size: 1rem; }
    }
  </style>
<base target="_blank">
</head>

<body>

  <div class="auth-overlay" id="authOverlay">
    <div class="auth-loader" id="authLoader"></div>
    <div class="auth-message" id="authMessage">جاري التحقق من الصلاحيات...</div>
    <div class="auth-submessage" id="authSubMessage">الرجاء الانتظار قليلاً</div>
    <button id="joinGroupBtn" class="modal-btn btn-save" style="display: none; margin-top: 20px;" onclick="tg.openTelegramLink('https://t.me/faresmathportal')">الانضمام للمجموعة</button>
  </div>

  <nav class="nav-bar">
    <button class="nav-btn hidden" id="homeBtn" onclick="goHome()"><i data-lucide="home"></i></button>
    <div class="breadcrumb" id="breadcrumb">الصفحة الرئيسية</div>
    
    <div class="credit-badge" title="رصيد الأوراق المتاحة للتصحيح">
      <i data-lucide="file-text" style="width: 18px; height: 18px;"></i>
      <span id="studentCredits">--</span>
    </div>

    <button class="nav-btn" id="searchToggleBtn" onclick="toggleSearch()"><i data-lucide="search"></i></button>
    <button class="nav-btn" onclick="openProfile()"><i data-lucide="user"></i></button>
    <button class="nav-btn" onclick="refreshData()"><i data-lucide="refresh-cw"></i></button>
  </nav>

  <div class="search-container" id="searchContainer">
    <div class="search-box">
      <i data-lucide="search" style="width: 20px; height: 20px; color: var(--text-secondary);"></i>
      <input type="text" class="search-input" id="searchInput" placeholder="ابحث عن درس، عنصر، أو موضوع..." autocomplete="off">
      <button class="search-btn" onclick="clearSearch()"><i data-lucide="x"></i></button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <main class="main-wrapper" id="mainWrapper">
    <section class="hero-section">
      <h1 class="hero-title" id="welcomeTitle">منصة الأستاذ فارس للرياضيات</h1>
      <p class="hero-subtitle">اختر المحور والدرس للبدء بالتعلم</p>
    </section>
    <div class="buttons-grid" id="buttonsGrid"></div>
  </main>

  <div class="content-viewer" id="contentViewer">
    <div class="content-header">
      <button class="nav-btn" onclick="closeContent()" style="background: rgba(239, 68, 68, 0.15); color: var(--error);"><i data-lucide="arrow-right"></i></button>
      <div class="content-title" id="contentTitle"></div>
      <div style="width: 44px;"></div>
    </div>
    <iframe class="content-frame" id="contentFrame"></iframe>
  </div>

  <div class="modal-overlay" id="profileModal">
    <div class="modal-content">
      <h3>إعدادات الملف الشخصي</h3>
      <input type="text" id="firstNameInput" class="modal-input" placeholder="الاسم الشخصي" />
      <input type="text" id="lastNameInput" class="modal-input" placeholder="اللقب العائلي" />
      <select id="genderInput" class="modal-input">
        <option value="male">ذكر</option>
        <option value="female">أنثى</option>
      </select>
      <div class="modal-actions">
        <button class="modal-btn btn-save" onclick="saveProfile()">حفظ التعديلات</button>
        <button class="modal-btn btn-cancel" onclick="closeProfile()">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const APP_VERSION = '1.1'; 

    const tg = window.Telegram?.WebApp;
    if (tg) {
      try { tg.ready(); } catch (e) {}
      try { if (typeof tg.expand === 'function') tg.expand(); } catch (e) {}
      try { if (typeof tg.requestFullscreen === 'function') tg.requestFullscreen(); } catch (e) {}
    }

    const firebaseConfig = {
      apiKey: "AIzaSyChVj7GwrU6J8EyG9X_HaP-RoyH97pqEAs",
      authDomain: "abc-abc-math.firebaseapp.com",
      databaseURL: "https://abc-abc-math-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "abc-abc-math",
      storageBucket: "abc-abc-math.firebasestorage.app",
      messagingSenderId: "696372753603",
      appId: "1:696372753603:web:08a90853aeffbe9cc05e76"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentUser = null;
    let userData = { firstName: '', lastName: '', gender: 'male' };

    const state = {
      data: null, history: [], currentView: 'axes', searchIndex: [], 
      isSearchActive: false, completedItems: new Set(), lastClickTime: 0, clickTimer: null
    };

    const elements = {
      homeBtn: document.getElementById('homeBtn'), breadcrumb: document.getElementById('breadcrumb'),
      buttonsGrid: document.getElementById('buttonsGrid'), contentViewer: document.getElementById('contentViewer'),
      contentFrame: document.getElementById('contentFrame'), contentTitle: document.getElementById('contentTitle'),
      toastContainer: document.getElementById('toastContainer'), searchContainer: document.getElementById('searchContainer'),
      searchInput: document.getElementById('searchInput'), searchResults: document.getElementById('searchResults'),
      searchToggleBtn: document.getElementById('searchToggleBtn'), mainWrapper: document.getElementById('mainWrapper'),
      welcomeTitle: document.getElementById('welcomeTitle'), profileModal: document.getElementById('profileModal'),
      firstNameInput: document.getElementById('firstNameInput'), lastNameInput: document.getElementById('lastNameInput'),
      genderInput: document.getElementById('genderInput')
    };

    elements.searchInput.addEventListener('input', handleSearch);

    function formatCount(count, singular, plural) {
      if (count === 0) return `0 ${plural}`;
      if (count === 1) return singular === 'درس' ? 'درس واحد' : 'عنصر واحد';
      if (count === 2) return singular === 'درس' ? 'درسان' : 'عنصران';
      if (count >= 3 && count <= 10) return `${count} ${plural}`;
      return `${count} ${singular}`;
    }

    function setWelcomeMessage() {
      let displayName = "طالبنا العزيز";
      if (userData.firstName || userData.lastName) {
          displayName = (userData.firstName + " " + userData.lastName).trim();
      }
      elements.welcomeTitle.innerText = "أهلاً " + displayName;
    }

    function openProfile() {
      elements.firstNameInput.value = userData.firstName;
      elements.lastNameInput.value = userData.lastName;
      elements.genderInput.value = userData.gender;
      elements.profileModal.classList.add('active');
    }

    function closeProfile() { elements.profileModal.classList.remove('active'); }

    function saveProfile() {
      userData.firstName = elements.firstNameInput.value.trim();
      userData.lastName = elements.lastNameInput.value.trim();
      userData.gender = elements.genderInput.value;

      if (currentUser && currentUser.id !== 'test_student') {
          database.ref('users/' + currentUser.id).update({
              firstName: userData.firstName, lastName: userData.lastName, gender: userData.gender
          }).then(() => {
              showToast("تم حفظ التعديلات بنجاح", "success");
              setWelcomeMessage(); closeProfile();
          }).catch((error) => { showToast("حدث خطأ أثناء الحفظ", "error"); });
      } else {
          setWelcomeMessage(); closeProfile(); showToast("تم الحفظ محلياً (أنت في وضع التجربة)", "info");
      }
    }

    function loadCompletedItems() {
      if (!currentUser || currentUser.id === 'test_student') return;
      database.ref('users/' + currentUser.id + '/completed').on('value', (snapshot) => {
        if (snapshot.exists()) state.completedItems = new Set(snapshot.val() || []);
      });
    }

    function saveCompletedItems() {
      if (!currentUser || currentUser.id === 'test_student') return;
      database.ref('users/' + currentUser.id + '/completed').set([...state.completedItems]);
    }

    function listenToStudentCredits() {
      if (!currentUser || currentUser.id === 'test_student') {
         document.getElementById('studentCredits').innerText = '100 ورقة'; return;
      }
      
      database.ref('users/' + currentUser.id + '/credits').on('value', (snapshot) => {
        const creditsNode = document.getElementById('studentCredits');
        if (snapshot.exists()) {
          const currentCredits = snapshot.val();
          creditsNode.innerText = currentCredits + ' ورقة';
          if (currentCredits <= 3) {
            creditsNode.parentElement.style.color = 'var(--error)';
            creditsNode.parentElement.style.borderColor = 'var(--error)';
            creditsNode.parentElement.style.background = 'rgba(239, 68, 68, 0.15)';
          } else {
            creditsNode.parentElement.style.color = 'var(--accent-gold)';
            creditsNode.parentElement.style.borderColor = 'var(--border-subtle)';
            creditsNode.parentElement.style.background = 'rgba(255, 215, 0, 0.15)';
          }
        } else { creditsNode.innerText = '100 ورقة'; }
      });
    }

    function isItemCompleted(itemId) { return state.completedItems.has(itemId); }

    function toggleItemCompletion(itemId) {
      if (state.completedItems.has(itemId)) { state.completedItems.delete(itemId); return false; } 
      else { state.completedItems.add(itemId); return true; }
    }

    function handleDoubleClick(itemId, btnElement, callback) {
      const currentTime = new Date().getTime();
      const timeDiff = currentTime - state.lastClickTime;

      if (timeDiff < 300 && timeDiff > 0) {
        clearTimeout(state.clickTimer);
        const isCompleted = toggleItemCompletion(itemId);
        btnElement.classList.add('double-click-hint');
        setTimeout(() => btnElement.classList.remove('double-click-hint'), 300);
        updateButtonCompletionState(btnElement, isCompleted);
        saveCompletedItems();
        const successMsg = userData.gender === 'female' ? 'أحسنتِ يا بطلة!' : 'أحسنت يا بطل!';
        showToast(isCompleted ? successMsg : 'تم إلغاء التأكيد', isCompleted ? 'success' : 'info');
        state.lastClickTime = 0;
      } else {
        state.clickTimer = setTimeout(() => { if (callback) callback(); }, 300);
        state.lastClickTime = currentTime;
      }
    }

    function updateButtonCompletionState(btnElement, isCompleted) {
      if (isCompleted) {
        btnElement.classList.add('completed');
        btnElement.querySelector('.btn-icon-wrapper').innerHTML = '<i data-lucide="check"></i>';
      } else {
        btnElement.classList.remove('completed');
        const itemType = btnElement.getAttribute('data-item-type');
        let iconName = itemType === 'axis' ? 'book-open' : itemType === 'folder' ? 'folder' : itemType === 'lesson' ? 'file-pen' : 'play-circle';
        btnElement.querySelector('.btn-icon-wrapper').innerHTML = `<i data-lucide="${iconName}"></i>`;
      }
      lucide.createIcons();
    }

    async function loadData() {
      try {
        let response = null;
        const possibleFiles = [
          'web-content.json?v=' + APP_VERSION, 'web-content(1).json?v=' + APP_VERSION,
          './web-content.json?v=' + APP_VERSION, './web-content(1).json?v=' + APP_VERSION
        ];

        for (const file of possibleFiles) {
          try {
            const res = await fetch(file, { cache: 'no-store' });
            if (res.ok) { response = res; break; }
          } catch (e) { }
        }

        if (!response || !response.ok) throw new Error('لم يتم العثور على ملف JSON');
        const data = await response.json();
        if (!data || !data.axes) throw new Error('ملف JSON غير صالح');

        state.data = data;
        buildSearchIndex(); 
        renderAxes();
      } catch (error) {
        elements.buttonsGrid.innerHTML = '<div style="text-align:center; width:100%; margin-top:20px; padding:20px;"><h3 style="color:#FFD700; margin-bottom:15px;">⚠️ تعذر تحميل البيانات</h3><p style="color:#94a3b8;">' + error.message + '</p></div>';
      }
    }

    function buildSearchIndex() {
      state.searchIndex = [];
      if (!state.data || !state.data.axes) return;
      
      for (const [axisId, axis] of Object.entries(state.data.axes)) {
        state.searchIndex.push({ type: 'axis', id: axisId, name: axis.name, path: [axis.name], data: { axisId, axisName: axis.name } });
        
        if (axis.lessons) {
            for (const [lessonId, lesson] of Object.entries(axis.lessons)) {
                state.searchIndex.push({ type: 'lesson', id: lessonId, name: lesson.name, path: [axis.name, lesson.name], data: { axisId, axisName: axis.name, lessonId, lessonName: lesson.name } });
                
                if (lesson.elements) {
                    for (const [elementId, element] of Object.entries(lesson.elements)) {
                        state.searchIndex.push({ type: 'element', id: elementId, name: element.name, path: [axis.name, lesson.name, element.name], data: { axisId, axisName: axis.name, lessonId, lessonName: lesson.name, element } });
                    }
                }
            }
        }
      }
    }

    function handleSearch(e) {
        const query = e.target.value.trim().toLowerCase();
        if (query.length === 0) { elements.searchResults.innerHTML = ''; elements.searchResults.classList.remove('active'); return; }

        const results = state.searchIndex.filter(item => 
            item.name.toLowerCase().includes(query) || item.path.join(' ').toLowerCase().includes(query)
        );
        renderSearchResults(results);
    }

    function renderSearchResults(results) {
        elements.searchResults.innerHTML = '';
        if (results.length === 0) {
            elements.searchResults.innerHTML = '<div class="search-result-item">لا توجد نتائج مطابقة 🔍</div>';
            elements.searchResults.classList.add('active'); return;
        }

        results.forEach(result => {
            const item = document.createElement('div');
            item.className = 'search-result-item';
            let icon = result.type === 'axis' ? 'book-open' : (result.type === 'lesson' ? 'file-pen' : 'play-circle');
            
            item.innerHTML = `
                <div class="search-result-icon"><i data-lucide="${icon}"></i></div>
                <div class="search-result-content">
                    <div class="search-result-title">${result.name}</div>
                    <div style="font-size: 0.8rem; color: var(--text-secondary)">${result.path.join(' / ')}</div>
                </div>
            `;
            item.onclick = () => { clearSearch(); toggleSearch(); navigateToResult(result); };
            elements.searchResults.appendChild(item);
        });
        lucide.createIcons(); elements.searchResults.classList.add('active');
    }

    function navigateToResult(result) {
        state.history = [{ view: 'axes' }]; 
        if (result.type === 'axis') renderLessons(result.data.axisId, result.data.axisName);
        else if (result.type === 'lesson') {
            state.history.push({ view: 'lessons', axisId: result.data.axisId, axisName: result.data.axisName });
            renderElements(result.data.axisId, result.data.lessonId, result.data.lessonName);
        } else if (result.type === 'element') {
            state.history.push({ view: 'lessons', axisId: result.data.axisId, axisName: result.data.axisName });
            state.history.push({ view: 'elements', axisId: result.data.axisId, lessonId: result.data.lessonId, lessonName: result.data.lessonName });
            renderElements(result.data.axisId, result.data.lessonId, result.data.lessonName);
            if(result.data.element.link && result.data.element.link !== 'غير مرفوع') showContent(result.data.element, result.data.lessonName);
            else showToast('هذا المحتوى غير متوفر', 'warning');
        }
    }

    function renderAxes() {
      state.history = [{ view: 'axes' }]; state.currentView = 'axes'; updateUI(); elements.buttonsGrid.innerHTML = '';
      if(!state.data || !state.data.axes) return;

      for (const [id, axis] of Object.entries(state.data.axes)) {
        const btn = createProgressButton({
          itemId: id, itemType: 'axis', text: axis.name,
          subtitle: formatCount(Object.keys(axis.lessons || {}).length, 'درس', 'دروس'),
          icon: 'book-open', onClick: () => renderLessons(id, axis.name), isPrimary: true
        });
        elements.buttonsGrid.appendChild(btn);
      }
      lucide.createIcons();
    }

    function renderLessons(axisId, axisName) {
      state.currentView = 'lessons';
      const last = state.history[state.history.length - 1];
      if (!(last && last.view === 'lessons' && last.axisId === axisId)) pushHistory('lessons', { axisId, axisName });

      elements.buttonsGrid.innerHTML = '';
      elements.buttonsGrid.appendChild(createButton({ text: 'رجوع', subtitle: 'العودة للمحاور', icon: 'arrow-right', onClick: navigateBack, isBack: true }));

      const lessons = state.data.axes[axisId].lessons || {};
      for (const [lessonId, lesson] of Object.entries(lessons)) {
        const btn = createProgressButton({
          itemId: lessonId, itemType: 'lesson', text: lesson.name,
          subtitle: formatCount(Object.keys(lesson.elements || {}).length, 'عنصر', 'عناصر'),
          icon: 'file-pen', onClick: () => renderElements(axisId, lessonId, lesson.name)
        });
        elements.buttonsGrid.appendChild(btn);
      }
      lucide.createIcons();
    }

    function renderElements(axisId, lessonId, lessonName) {
      state.currentView = 'elements';
      const last = state.history[state.history.length - 1];
      if (!(last && last.view === 'elements' && last.lessonId === lessonId)) pushHistory('elements', { axisId, lessonId, lessonName });

      elements.buttonsGrid.innerHTML = '';
      elements.buttonsGrid.appendChild(createButton({ text: 'رجوع', subtitle: 'العودة للدروس', icon: 'arrow-right', onClick: navigateBack, isBack: true }));

      const lessonElements = state.data.axes[axisId].lessons[lessonId].elements || {};
      for (const [elementId, element] of Object.entries(lessonElements)) {
        const isAvailable = element.link && element.link !== 'غير مرفوع';
        const btn = createProgressButton({
          itemId: elementId, itemType: 'element', text: element.name,
          subtitle: isAvailable ? 'عرض داخل التطبيق' : 'غير متوفر',
          icon: 'play-circle', onClick: isAvailable ? () => showContent(element, lessonName) : () => showToast('هذا المحتوى غير متوفر', 'warning'),
          disabled: !isAvailable, isWebItem: true
        });
        elements.buttonsGrid.appendChild(btn);
      }
      lucide.createIcons();
    }

    function createButton({ text, subtitle, icon, onClick, isPrimary, isBack }) {
      const btn = document.createElement('button');
      btn.className = `btn-card ${isPrimary ? 'btn-primary-card' : ''} ${isBack ? 'btn-back' : ''}`;
      btn.innerHTML = `<div class="btn-icon-wrapper"><i data-lucide="${icon}"></i></div><div class="btn-content"><span class="btn-title">${text}</span>${subtitle ? `<span class="btn-subtitle">${subtitle}</span>` : ''}</div><i data-lucide="chevron-left" style="width: 20px; height: 20px; color: var(--text-secondary);"></i>`;
      btn.onclick = onClick; return btn;
    }

    function createProgressButton({ itemId, itemType, text, subtitle, icon, onClick, disabled, isWebItem }) {
      const btn = document.createElement('button');
      const isCompleted = isItemCompleted(itemId);
      btn.className = `btn-card ${isCompleted ? 'completed' : ''} ${isWebItem ? 'web-item' : ''}`;
      btn.setAttribute('data-item-id', itemId); btn.setAttribute('data-item-type', itemType);
      if (disabled) btn.disabled = true;

      btn.innerHTML = `<div class="btn-icon-wrapper"><i data-lucide="${isCompleted ? 'check' : icon}"></i></div><div class="btn-content"><span class="btn-title">${text}</span>${subtitle ? `<span class="btn-subtitle">${subtitle}</span>` : ''}</div><i data-lucide="chevron-left" style="width: 20px; height: 20px; color: var(--text-secondary);"></i>`;
      btn.addEventListener('click', () => handleDoubleClick(itemId, btn, onClick)); return btn;
    }

    function showContent(element, lessonName) {
      elements.contentTitle.textContent = `${lessonName} - ${element.name}`;
      elements.contentViewer.classList.add('active');
      const sep = element.link.includes('?') ? '&' : '?';
      elements.contentFrame.src = element.link + sep + 'v=' + APP_VERSION;
    }
    
    function closeContent() { elements.contentViewer.classList.remove('active'); elements.contentFrame.src = 'about:blank'; }
    function pushHistory(view, data) { state.history.push({ view, ...data }); updateUI(); }
    function updateUI() {
      const parts = ['الرئيسية']; const current = state.history[state.history.length - 1];
      if (current) { if (current.axisName) parts.push(current.axisName); if (current.lessonName) parts.push(current.lessonName); }
      elements.breadcrumb.textContent = parts.join(' / ');
      elements.homeBtn.classList.toggle('hidden', state.history.length <= 1);
    }
    function navigateBack() {
      if (elements.contentViewer.classList.contains('active')) return closeContent();
      if (state.history.length > 1) {
        state.history.pop(); const last = state.history[state.history.length - 1];
        if(last.view === 'axes') renderAxes(); else if(last.view === 'lessons') renderLessons(last.axisId, last.axisName); else if(last.view === 'elements') renderElements(last.axisId, last.lessonId, last.lessonName);
      } else goHome();
    }
    function goHome() { state.history = []; renderAxes(); }
    function refreshData() { loadData(); }

    function showToast(message, type) {
      const toast = document.createElement('div'); toast.className = `toast ${type}`;
      const colors = { success: '#10b981', warning: '#f59e0b', error: '#ef4444', info: '#FFD700' };
      toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'info'}" style="color: ${colors[type]}; width: 20px; height: 20px;"></i><span>${message}</span>`;
      elements.toastContainer.appendChild(toast); lucide.createIcons(); setTimeout(() => toast.remove(), 3000);
    }

    function toggleSearch() {
      state.isSearchActive = !state.isSearchActive;
      if (state.isSearchActive) { elements.searchContainer.style.display = 'block'; elements.searchInput.focus(); elements.searchToggleBtn.classList.add('active'); } 
      else { elements.searchContainer.style.display = 'none'; clearSearch(); elements.searchToggleBtn.classList.remove('active'); }
    }
    function clearSearch() { elements.searchInput.value = ''; elements.searchResults.classList.remove('active'); elements.searchResults.innerHTML = ''; }


    // ==========================================
    // دالة الاتصال بالخادم للتحقق من العضوية
    // ==========================================
    async function verifyMembership() {
        const initData = window.Telegram?.WebApp?.initData;
        
        // منع الدخول من خارج تليجرام
        if (!initData) { throw new Error("unauthorized_app"); }

        try {
            // الرابط الخاص بخادمك على Render
            const response = await fetch('https://fares-bot-api.onrender.com/api/verify-access', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initData: initData })
            });

            if (response.ok) { return true; } 
            else if (response.status === 403) { throw new Error("not_member"); } 
            else if (response.status === 401) { throw new Error("spoofed_data"); } 
            else { throw new Error("server_error"); }
        } catch (error) { throw error; }
    }

    // ==========================================
    // تهيئة وتشغيل التطبيق
    // ==========================================
    async function init() {
        elements.searchContainer.style.display = 'none';
        
        const authOverlay = document.getElementById('authOverlay');
        const authMessage = document.getElementById('authMessage');
        const authSubMessage = document.getElementById('authSubMessage');
        const authLoader = document.getElementById('authLoader');
        const joinGroupBtn = document.getElementById('joinGroupBtn');

        try {
            // 1. إرسال البيانات للخادم للتحقق من العضوية أولاً
            await verifyMembership();
            
            // 2. إذا نجح التحقق، يتم إخفاء شاشة التحقق وفتح التطبيق
            authOverlay.style.display = 'none';

            // 3. إكمال تهيئة التطبيق
            try { currentUser = Telegram.WebApp.initDataUnsafe?.user; } catch(e) { currentUser = null; }
            
            loadData();

            if (currentUser) {
                userData.firstName = currentUser.first_name || '';
                userData.lastName = currentUser.last_name || '';
            }
            setWelcomeMessage(); 

            if (currentUser && currentUser.id !== 'test_student') {
                try {
                    const userSnapshot = await database.ref('users/' + currentUser.id).once('value');
                    if (userSnapshot.exists()) {
                        const dbData = userSnapshot.val();
                        if (dbData.gender) userData.gender = dbData.gender;
                        if (dbData.firstName) userData.firstName = dbData.firstName;
                        if (dbData.lastName) userData.lastName = dbData.lastName;
                        setWelcomeMessage();
                    }
                    loadCompletedItems();
                    listenToStudentCredits(); 
                } catch (error) {
                    console.warn("تعذر الاتصال بقاعدة البيانات، يرجى التأكد من الصلاحيات");
                }
            } else {
                currentUser = { id: 'test_student' };
                document.getElementById('studentCredits').innerText = 'تجريبي';
                try { loadCompletedItems(); } catch(e) {}
            }

        } catch (error) {
            // معالجة حالات الرفض وإظهار رسائل مناسبة
            authLoader.style.display = 'none';
            
            if (error.message === "not_member") {
                authMessage.innerText = "عذراً، لا تملك صلاحية الدخول!";
                authMessage.style.color = "var(--error)";
                authSubMessage.innerText = "يجب عليك الانضمام إلى مجموعة الأستاذ فارس لتتمكن من استخدام المنصة.";
                joinGroupBtn.style.display = 'block'; 
            } else if (error.message === "spoofed_data") {
                authMessage.innerText = "بيانات غير صالحة!";
                authMessage.style.color = "var(--error)";
                authSubMessage.innerText = "تم اكتشاف تلاعب بالبيانات، تم رفض الوصول.";
            } else if (error.message === "unauthorized_app") {
                authMessage.innerText = "الوصول مقيد!";
                authMessage.style.color = "var(--warning)";
                authSubMessage.innerText = "الرجاء فتح هذه المنصة من داخل تطبيق تليجرام حصراً.";
            } else {
                authMessage.innerText = "حدث خطأ في الاتصال!";
                authMessage.style.color = "var(--error)";
                authSubMessage.innerText = "تعذر الاتصال بخادم التحقق، يرجى المحاولة لاحقاً.";
            }
        }
    }

    init();
  </script>
